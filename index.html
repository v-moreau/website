    <hl style="padding-top:20px;">
        About
    </hl>
    <p>
        We are the Compositional Systems and Methods group at TalTech. The
        group's goal is to study compositional techniques in the context of
        models of computation, understood broadly and guided by category theory.
        We work closely with our sister group: <a href="https://cs.ioc.ee/lsg/">Logic and Semantics</a>.
    </p>
